name: Federation Map Refresh
on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Render topology
        id: render
        run: python scripts/render_topology.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether commit needed
        id: check
        run: |
          if [ -f data/federation/.needs_commit ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "federation-map[bot]"
          git config user.email "federation-map[bot]@users.noreply.github.com"
          git add README.md data/federation/peers.json data/federation/topology.json data/federation/history.jsonl data/federation/.last_topology_hash data/federation/.needs_commit
          git diff --staged --quiet && exit 0

          # Commit first, then rebase, then push
          git commit -m "chore: federation map refresh [skip ci]"

          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break
            sleep $((i * 5))
          done

          git push origin ${{ github.ref_name }}
