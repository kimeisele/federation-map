name: Federation Map Refresh
on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Render topology
        run: python scripts/render_topology.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: check
        run: |
          HASH=$(python -c "
import json, hashlib
from pathlib import Path
p = Path('data/federation/topology.json')
if p.exists():
    d = json.loads(p.read_text())
    payload = {k:v for k,v in d.items() if k != 'generated_at'}
    raw = json.dumps(payload, sort_keys=True, ensure_ascii=True, separators=(',',':'))
    print(hashlib.sha256(raw.encode()).hexdigest())
")
          LAST=$(cat data/federation/.last_topology_hash 2>/dev/null || echo "")
          echo "current=$HASH" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.current != steps.check.outputs.last
        run: |
          git config user.name "federation-map[bot]"
          git config user.email "federation-map[bot]@users.noreply.github.com"
          git add README.md data/
          git diff --staged --quiet && exit 0

          # Rebase-safe push with retry
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break
            sleep $((i * 3))
          done

          git commit -m "chore: federation map refresh [skip ci]"
          git push origin ${{ github.ref_name }} || true
